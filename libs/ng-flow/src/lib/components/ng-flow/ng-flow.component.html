<div #flowContainer class="vue-flow" [style.width.%]="100" [style.height.%]="100">
  <lib-viewport>
    <lib-edge-renderer />
    <lib-connection-line />
    <div class="vue-flow__edge-labels"></div>
    <lib-node-renderer />
    <!-- zoom-pane slot (affected by zoom/pan) -->
    <ng-content select="[slot='zoom-pane']" />
  </lib-viewport>

  <!-- default slot (not affected by zoom/pan) -->
  <ng-content />
</div>
