<div class="layout">
  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="header">
    <button
      class="btn-icon"
      title="Add node"
      (click)="workflow.paletteOpen.set(!workflow.paletteOpen())"
    >
      <app-icon name="plus" [size]="18" />
    </button>

    <div class="divider"></div>

    <app-icon name="workflow" [size]="16" class="logo-icon" />
    <span class="title">Luigi Workflow</span>

    <div class="spacer"></div>

    <span class="stat">
      <app-icon name="layout-grid" [size]="12" />
      {{ workflow.nodeCount() }} nodes
    </span>
    <span class="stat">
      {{ workflow.edgeCount() }} edges
    </span>

    <div class="divider"></div>

    <button class="btn" title="Zoom in" (click)="workflow.zoomIn()">
      <app-icon name="zoom-in" [size]="14" />
    </button>
    <span class="zoom-badge">{{ workflow.zoomLevel() }}%</span>
    <button class="btn" title="Zoom out" (click)="workflow.zoomOut()">
      <app-icon name="zoom-out" [size]="14" />
    </button>

    <div class="divider"></div>

    <button class="btn btn-primary" (click)="workflow.fitView()">
      <app-icon name="maximize-2" [size]="14" />
      Fit view
    </button>
  </header>

  <!-- ── Node palette (slide-in) ──────────────────────────── -->
  @if (workflow.paletteOpen()) {
    <app-node-palette />
  }

  <!-- ── Canvas ───────────────────────────────────────────── -->
  <div class="canvas-wrap">
    <lib-ng-flow
      [nodes]="workflow.nodes()"
      [edges]="workflow.edges()"
      [fitViewOnInit]="true"
      [applyDefault]="false"
      [snapToGrid]="true"
      [snapGrid]="[20, 20]"
      [minZoom]="0.2"
      [maxZoom]="3"
      [connectionMode]="ConnectionMode.Loose"
      [connectionRadius]="30"
      (init)="onInit($event)"
      (nodesChange)="onNodesChange($event)"
      (edgesChange)="onEdgesChange($event)"
      (connect)="onConnect($event)"
      (viewportChange)="onViewportChange($event)"
    >
      <lib-background variant="dots" [gap]="40" color="#2a2f3a" bgColor="#141720" />
    </lib-ng-flow>
  </div>
</div>
